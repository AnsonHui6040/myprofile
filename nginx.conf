server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  server_tokens off;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), browsing-topics=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;

  # The current site uses inline React/Babel and Google Fonts CDN.
  # Keep this CSP compatible with the existing structure while limiting obvious third-party risk.
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; connect-src 'self'; upgrade-insecure-requests" always;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location = / {
    try_files /index.html =404;
    add_header Cache-Control "no-cache" always;
  }

  location ~* \.html$ {
    try_files $uri =404;
    add_header Cache-Control "no-cache" always;
  }

  location = /shared.jsx {
    types { }
    default_type text/babel;
    try_files $uri =404;
    add_header Cache-Control "no-cache" always;
  }

  location ~* \.(?:jpg|jpeg|png|webp|avif|gif|svg|ico)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
  }

  location ~* \.(?:css|js|mjs|woff2?)$ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
  }

  location ~ /\. {
    deny all;
  }
}
